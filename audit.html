<head>

<style>
:root {
  --gold:     #c9a84c;
  --gold-h:   #b8922e;

}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background:var(--bg); color:var(--ink); font-family:var(--fb); font-size:17px;
  font-weight:400; line-height:1.7; min-height:100vh; overflow-x:hidden;

}
.reveal {
  opacity: 0; transform: translateY(30px);
  transition: opacity 0.7s cubic-bezier(.4,0,.2,1), transform 0.7s cubic-bezier(.4,0,.2,1);
}
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.float-anim { animation: float 6s ease-in-out infinite; }
@keyframes glowPulse { 0%,100%{opacity:.07;transform:translateX(-50%) scale(1)} 50%{opacity:.12;transform:translateX(-50%) scale(1.05)} }
.bar {
  position:sticky; top:0; z-index:200; background:rgba(13,13,13,.92);

}

.bar-right {

}
.live { width:6px; height:6px; border-radius:50%; background:var(--gold); animation:blink 2.4s ease infinite; }

}
