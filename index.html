<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Pipeline — Kolkata AI Consultancy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --hot: #4ade80;
    --hot-bg: rgba(74,222,128,0.1);
    --hot-border: rgba(74,222,128,0.25);
    --warm: #fb923c;
    --warm-bg: rgba(251,146,60,0.1);
    --warm-border: rgba(251,146,60,0.25);
    --cold: #64748b;
    --cold-bg: rgba(100,116,139,0.1);
    --cold-border: rgba(100,116,139,0.2);
    --accent: #6366f1;
    --accent-bg: rgba(99,102,241,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }

  /* Header */
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
  .header-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 13px; color: var(--text2); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 4px 12px; border-radius: 20px; font-family: 'DM Mono', monospace; font-weight: 500; }
  .badge-free { background: var(--accent-bg); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }
  .badge-live { background: rgba(74,222,128,0.1); color: var(--hot); border: 1px solid var(--hot-border); display: flex; align-items: center; gap: 5px; }
  .badge-live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--hot); animation: pulse 2s infinite; display: block; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .run-time { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: border-color 0.2s;
  }
  .metric:hover { border-color: var(--border2); }
  .metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; font-family: 'DM Mono', monospace; }
  .metric-value { font-size: 28px; font-weight: 600; letter-spacing: -1px; }
  .metric-value.hot { color: var(--hot); }
  .metric-value.warm { color: var(--warm); }
  .metric-value.cold { color: var(--cold); }
  .metric-value.accent { color: #818cf8; }

  /* Charts */
  .charts-row { display: grid; grid-template-columns: 1fr 2fr; gap: 12px; margin-bottom: 24px; }
  @media(max-width:600px){ .charts-row { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .card-title { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; font-family: 'DM Mono', monospace; }

  /* Leads table */
  .leads-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .leads-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    font-size: 12px; padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: #818cf8; }
  .filter-btn.active { background: var(--accent-bg); color: #818cf8; border-color: rgba(99,102,241,0.4); }
  .col-heads { display: grid; grid-template-columns: 2fr 2.5fr 1.2fr 1fr 70px; gap: 12px; padding: 0 0 10px; border-bottom: 1px solid var(--border); }
  .col-head { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.7px; font-family: 'DM Mono', monospace; }
  .lead-row {
    display: grid; grid-template-columns: 2fr 2.5fr 1.2fr 1fr 70px;
    gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border);
    align-items: start; transition: background 0.15s; border-radius: 6px;
  }
  .lead-row:last-child { border-bottom: none; }
  .lead-row:hover { background: rgba(255,255,255,0.02); }
  .co-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .co-type { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .co-site { font-size: 11px; color: #818cf8; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .problem-text { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .contact-text { font-size: 12px; color: var(--text2); word-break: break-all; }
  .score-pill {
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }
  .pill-hot { background: var(--hot-bg); color: var(--hot); border: 1px solid var(--hot-border); }
  .pill-warm { background: var(--warm-bg); color: var(--warm); border: 1px solid var(--warm-border); }
  .pill-cold { background: var(--cold-bg); color: var(--cold); border: 1px solid var(--cold-border); }

  /* Outreach */
  .outreach-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .pitch-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; margin-top: 16px; }
  .pitch-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    border-left: 3px solid var(--hot);
    transition: border-color 0.2s;
  }
  .pitch-item:hover { border-color: var(--hot); border-left-color: var(--hot); }
  .pitch-company { font-size: 13px; font-weight: 500; color: var(--text); }
  .pitch-phone { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .pitch-text { font-size: 12px; color: var(--text2); margin-top: 8px; line-height: 1.6; }
  .pitch-score { display: inline-block; margin-top: 8px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--hot); }

  /* Loading */
  .loading { text-align: center; padding: 60px 20px; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 13px; }
  .loading::after { content: ''; animation: dots 1.5s infinite; }
  @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }

  /* Mobile */
  @media(max-width:600px){
    .col-heads, .lead-row { grid-template-columns: 1fr 1fr; }
    .col-heads .col-head:nth-child(3),
    .col-heads .col-head:nth-child(4),
    .lead-row > *:nth-child(3),
    .lead-row > *:nth-child(4) { display: none; }
  }

  .empty { text-align: center; padding: 32px; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 13px; }
  .refresh-btn {
    font-size: 12px; padding: 6px 16px; border-radius: 20px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: #818cf8; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <div class="header-title">Lead pipeline</div>
      <div class="header-sub">Kolkata AI Consultancy · Serper + Gemini + n8n</div>
    </div>
    <div class="header-right">
      <span class="badge badge-live">Live</span>
      <span class="badge badge-free">Free stack</span>
      <button class="refresh-btn" onclick="loadData()">Refresh</button>
    </div>
  </div>

  <div id="app"><div class="loading">Loading leads</div></div>

</div>

<script>
// ============================================================
// CONFIGURATION — paste your JSONbin Bin ID here after setup
// ============================================================
const JSONBIN_BIN_ID = 'PASTE_BIN_ID_HERE';
const JSONBIN_API_KEY = 'PASTE_JSONBIN_API_KEY_HERE';
// ============================================================

// FALLBACK DATA — shown when JSONbin is not yet set up
const FALLBACK_DATA = {
  run_date: '15 March 2026',
  run_time: '11:30 PM',
  leads: [
    { company_name: 'Bengal Realty Advisors', website: 'bengalrealty.in', business_type: 'Real Estate', email: 'info@bengalrealty.in', phone: '9831000002', score: 9, category: 'Hot', inferred_problem: 'Manual WhatsApp follow-ups losing hot property inquiries within first hour', outreach_angle: 'Automate your flat inquiry follow-ups — reply to leads in under 60 seconds with n8n' },
    { company_name: 'Rajarhat Property Hub', website: 'rajarhatpropertyhub.com', business_type: 'Real Estate', email: 'To Research', phone: '9831000003', score: 8, category: 'Hot', inferred_problem: 'No CRM — all Newtown leads managed in WhatsApp groups with no tracking', outreach_angle: 'Build you a free lead tracking dashboard so no Rajarhat inquiry ever slips through' },
    { company_name: 'Nambiar Builders Kolkata', website: 'nambiarconstructions.com', business_type: 'Real Estate', email: 'To Research', phone: '9831000001', score: 6, category: 'Warm', inferred_problem: 'Relies on walk-in customers only — no digital lead capture from website', outreach_angle: 'Add an auto-capture form to your site that feeds leads directly into a daily report' },
    { company_name: 'Park Street Bistro', website: 'parkstreetbistro.in', business_type: 'Restaurant', email: 'To Research', phone: '9831000004', score: 5, category: 'Warm', inferred_problem: 'No repeat customer strategy — losing diners after first visit with no follow-up', outreach_angle: 'Build a simple WhatsApp re-engagement flow to bring back past customers monthly' },
    { company_name: 'Salt Lake Retail Hub', website: 'saltlakeretail.com', business_type: 'Retail', email: 'To Research', phone: '9831000005', score: 3, category: 'Cold', inferred_problem: 'No digital presence or marketing automation strategy in place', outreach_angle: 'Start with a free audit — show exactly what automation would look like for your store' }
  ]
};

let allLeads = [];
let donutChart = null;
let barChart = null;

async function loadData() {
  document.getElementById('app').innerHTML = '<div class="loading">Loading leads</div>';

  let data = FALLBACK_DATA;

  if (JSONBIN_BIN_ID !== 'PASTE_BIN_ID_HERE') {
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_API_KEY }
      });
      const json = await res.json();
      data = json.record;
    } catch (e) {
      console.log('Using fallback data');
    }
  }

  allLeads = data.leads || [];
  renderAll(data);
}

function renderAll(data) {
  const leads = data.leads || [];
  const hot = leads.filter(l => l.score >= 7);
  const warm = leads.filter(l => l.score >= 4 && l.score < 7);
  const cold = leads.filter(l => l.score < 4);
  const avg = leads.length ? (leads.reduce((s,l) => s + l.score, 0) / leads.length).toFixed(1) : 0;
  const research = leads.filter(l => l.email === 'To Research').length;

  document.getElementById('app').innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Total</div><div class="metric-value accent">${leads.length}</div></div>
      <div class="metric"><div class="metric-label">Hot 🔥</div><div class="metric-value hot">${hot.length}</div></div>
      <div class="metric"><div class="metric-label">Warm</div><div class="metric-value warm">${warm.length}</div></div>
      <div class="metric"><div class="metric-label">Cold</div><div class="metric-value cold">${cold.length}</div></div>
      <div class="metric"><div class="metric-label">Avg score</div><div class="metric-value accent">${avg}</div></div>
      <div class="metric"><div class="metric-label">No email</div><div class="metric-value">${research}</div></div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="card-title">Breakdown</div>
        <div style="position:relative;width:100%;height:160px;"><canvas id="donutChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="card-title">Score by company</div>
        <div style="position:relative;width:100%;height:180px;"><canvas id="barChart"></canvas></div>
      </div>
    </div>

    <div class="leads-card">
      <div class="leads-top">
        <div class="card-title" style="margin:0">All leads</div>
        <div class="filter-row">
          <button class="filter-btn active" onclick="filterLeads('all',this)">All</button>
          <button class="filter-btn" onclick="filterLeads('Hot',this)">Hot</button>
          <button class="filter-btn" onclick="filterLeads('Warm',this)">Warm</button>
          <button class="filter-btn" onclick="filterLeads('Cold',this)">Cold</button>
        </div>
      </div>
      <div class="col-heads">
        <div class="col-head">Company</div>
        <div class="col-head">Problem</div>
        <div class="col-head">Email</div>
        <div class="col-head">Phone</div>
        <div class="col-head">Score</div>
      </div>
      <div id="leads-list"></div>
    </div>

    <div class="outreach-card">
      <div class="card-title">Ready to pitch — hot leads</div>
      <div class="pitch-grid" id="pitch-grid"></div>
    </div>

    <div class="run-time">Last run: ${data.run_date || 'N/A'} at ${data.run_time || ''} IST</div>
  `;

  renderLeadRows(leads);
  renderPitches(hot);
  renderCharts(hot.length, warm.length, cold.length, leads);
}

function renderLeadRows(leads) {
  const list = document.getElementById('leads-list');
  if (!leads.length) { list.innerHTML = '<div class="empty">No leads found</div>'; return; }
  list.innerHTML = leads.map(l => {
    const pillClass = l.score >= 7 ? 'pill-hot' : l.score >= 4 ? 'pill-warm' : 'pill-cold';
    return `<div class="lead-row">
      <div>
        <div class="co-name">${l.company_name}</div>
        <div class="co-type">${l.business_type || ''}</div>
        <div class="co-site">${l.website || ''}</div>
      </div>
      <div class="problem-text">${l.inferred_problem}</div>
      <div class="contact-text">${l.email}</div>
      <div class="contact-text">${l.phone}</div>
      <div><span class="score-pill ${pillClass}">${l.score}/10</span></div>
    </div>`;
  }).join('');
}

function renderPitches(hotLeads) {
  const grid = document.getElementById('pitch-grid');
  if (!hotLeads.length) { grid.innerHTML = '<div class="empty">No hot leads yet</div>'; return; }
  grid.innerHTML = hotLeads.map(l => `
    <div class="pitch-item">
      <div class="pitch-company">${l.company_name}</div>
      <div class="pitch-phone">${l.phone}</div>
      <div class="pitch-text">${l.outreach_angle}</div>
      <div class="pitch-score">${l.score}/10 · ${l.category}</div>
    </div>
  `).join('');
}

function filterLeads(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = filter === 'all' ? allLeads : allLeads.filter(l => l.category === filter);
  renderLeadRows(filtered);
}

function renderCharts(hot, warm, cold, leads) {
  if (donutChart) donutChart.destroy();
  if (barChart) barChart.destroy();

  donutChart = new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: {
      labels: ['Hot', 'Warm', 'Cold'],
      datasets: [{ data: [hot, warm, cold], backgroundColor: ['#4ade80','#fb923c','#64748b'], borderWidth: 0, hoverOffset: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '70%',
      plugins: { legend: { display: false } }
    }
  });

  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: leads.map(l => l.company_name.split(' ')[0]),
      datasets: [{
        data: leads.map(l => l.score),
        backgroundColor: leads.map(l => l.score >= 7 ? '#4ade80' : l.score >= 4 ? '#fb923c' : '#64748b'),
        borderRadius: 6, borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { min: 0, max: 10, ticks: { stepSize: 2, color: '#555', font: { size: 11, family: 'DM Mono' } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        x: { ticks: { color: '#555', font: { size: 10, family: 'DM Mono' } }, grid: { display: false } }
      }
    }
  });
}

loadData();
</script>
</body>
</html>
